name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run app
        run: node api.js &

      - name: Wait for server
        run:  |
          for i in {1..10}; do
            curl -s http://localhost:3000 && break
            echo "Waiting for server..."
            sleep 2
          done
      - name: Verify Secret

        run: |

          if [ -z "$RENDER_API_KEY" ]; then
            echo "Secret missing"
            exit 1
          else
            echo "GitHub Secret detected"
          fi

        env:

          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    

      - name: Test API
        run: curl -f http://localhost:3000
        
      - name: Stop server
        run: pkill node

      - name: Confirm success
        run: echo "✅ CI pipeline completed successfully!"
