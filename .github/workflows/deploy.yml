name: CI Pipeline

on:
  push:
    branches:
      - main
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: local_api_js

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run app
        run: node api.js &

      - name: Wait for server
        run: sleep 3

      - name: Test API
        run: curl -f http://localhost:3000/api

      - name: Test newAPI
        run: curl -f http://localhost:3000/newapi

      - name: Stop server
        run: pkill node

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy Frontend
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }} 
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            # Production frontend
            curl --fail -X POST "https://api.render.com/deploy/srv-d8ihkrsm0tmc73bl15lg?key=PlGS-svDSA4" \
            -H "Authorization: Bearer $RENDER_API_KEY"
          else
            # Staging frontend
            curl --fail -X POST "https://api.render.com/deploy/srv-d8ihhbe7r5hc73ctupcg?key=8E5FZ3owV7Q" \
            -H "Authorization: Bearer $RENDER_API_KEY"
          fi

      - name: Deploy Backend
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            # Production backend
            curl --fail -X POST "https://api.render.com/deploy/srv-d8iii1a8qa3s73ef0l3g?key=Dkq77L2Jgbg" \
            -H "Authorization: Bearer $RENDER_API_KEY"
          else
            # Staging backend
            curl --fail -X POST "https://api.render.com/deploy/srv-d8ijjbjtqb8s73b82srg?key=xXcKybzZJfE" \
            -H "Authorization: Bearer $RENDER_API_KEY"
          fi
