name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy Frontend Staging
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/deploy/https://api.render.com/deploy/srv-d8ihhbe7r5hc73ctupcg?key=8E5FZ3owV7Q" \
          -H "Authorization: Bearer $RENDER_API_KEY"

      - name: Deploy Backend Staging
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/deploy/https://api.render.com/deploy/srv-d8ijjbjtqb8s73b82srg?key=xXcKybzZJfE" \
          -H "Authorization: Bearer $RENDER_API_KEY"
     
